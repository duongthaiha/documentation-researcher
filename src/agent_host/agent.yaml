kind: hosted
name: doc-reviewer-orchestrator
protocols:
    - protocol: responses
      version: 1.0.0
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
environment_variables:
    # Point the orchestrator at the UK South project where the sub-agent prompt
    # agents (research/writer/fsi/manufacturing/engineering) are deployed; the
    # hosted orchestrator invokes them by name via this endpoint.
    - name: AZURE_AI_PROJECT_ENDPOINT
      value: https://foundry-uk-hd-externale5.services.ai.azure.com/api/projects/proj-default
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4
    # Required by Settings.from_env(); the hosted research sub-agent uses MCP
    # server-side, so any valid URL satisfies the local validation here.
    - name: WORKIQ_MCP_URL
      value: https://learn.microsoft.com/api/mcp
    - name: REVIEW_ROUNDS
      value: "1"
