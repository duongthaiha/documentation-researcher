name: research-agent
description: >-
  Technical research agent that answers reviewer questions using Microsoft Learn,
  WorkIQ and GitHub MCP tools, with citations.
kind: prompt
# Model deployment is resolved at deploy time from AZURE_AI_MODEL_DEPLOYMENT_NAME.
model: gpt-4o
version: 0.1.0
# MCP server URLs are resolved at deploy time from Settings (env vars).
tools:
  - type: mcp
    server_label: mslearn
  - type: mcp
    server_label: workiq
  - type: mcp
    server_label: github
